name: E2E Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Monday 6am UTC

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_TOKEN: ${{ secrets.E2E_GH_TOKEN }}
      FIXTURE_REPO: maszynka/gh-crfix-e2e-fixtures
    steps:
      - name: Check required secrets
        id: check
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ] || [ -z "${{ secrets.E2E_GH_TOKEN }}" ]; then
            echo "::notice::Skipping E2E — ANTHROPIC_API_KEY or E2E_GH_TOKEN not configured. Set both secrets to enable."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout gh-crfix
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          path: gh-crfix

      - name: Checkout fixture repo
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          repository: maszynka/gh-crfix-e2e-fixtures
          token: ${{ secrets.E2E_GH_TOKEN }}
          path: fixture-repo

      - name: Configure git
        if: steps.check.outputs.skip != 'true'
        run: |
          git config --global user.email "e2e@gh-crfix.dev"
          git config --global user.name "gh-crfix E2E"

      - name: Install Claude CLI
        if: steps.check.outputs.skip != 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Verify tools
        if: steps.check.outputs.skip != 'true'
        run: |
          gh --version
          jq --version
          claude --version

      - name: Cleanup stale E2E branches
        if: steps.check.outputs.skip != 'true'
        run: |
          git -C fixture-repo fetch --prune origin
          for branch in $(git -C fixture-repo branch -r | grep 'origin/e2e-test-' | sed 's|origin/||'); do
            echo "Deleting stale branch: $branch"
            git -C fixture-repo push origin --delete "$branch" 2>/dev/null || true
          done

      - name: Run E2E test
        if: steps.check.outputs.skip != 'true'
        env:
          FIXTURE_DIR: ${{ github.workspace }}/fixture-repo
        run: bash gh-crfix/test/e2e/run-e2e.sh
